# How to convert from al-folio's cv.yml:
# 1. Duplicate al-folio's cv.yml, rename it to cv-rendercv.yml, and make the following changes to the copy.
# 2. Under "cv:" root, rename the "summary:" key to  "headline:".
# 3. Under "cv:" root, remove the entire "address:" block, if present.
# 4. In the "Skills:" section, rename each "- name:" key to  "- label:" 
# 5. In the "Skills:" section, rename each "keywords:" key to  "details:" 
# 6. In the "Experience:" section, remove any html angle bracket tags.
#     - Note that it is ok to replace html anchor tags with "[]()" markdown syntax
#       for links embedded within double quoted string text fields.
# 7. In the "Experience:" section, edit the "Early Career" kludge as follows:
#     - company: "Early Career"
#       position: ""
#       location:
#===-===-===-===-===-===-===-===-===-===-===-===-===-===-===-===-===-===-===-===-===-===

